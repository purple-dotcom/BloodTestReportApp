{% extends "base.html" %}
{% block title %}Report{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-0">{{ report[2] }}</h4>
        <small class="text-muted">{{ report[3] }}</small>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-dark btn-sm">← Back</a>
</div>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Parameter</th>
            <th>Value</th>
            <th>Unit</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for row in results %}
        <tr class="{% if row[4] == 'Red' %}table-danger{% elif row[4] == 'Amber' %}table-warning{% else %}table-success{% endif %}">
            <td>{{ row[0] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
