<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Blood Test Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
    body {
        font-family: 'DM Sans', sans-serif;
    }
    code, .mono {
        font-family: 'DM Mono', monospace;
    }
</style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🩸 Blood Test Analyzer</span>
        {% if session.get('user_id') %}
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
        {% endif %}
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
