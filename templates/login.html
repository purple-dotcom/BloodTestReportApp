<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <form action="{{url_for('login')}}" method="post">
            <p>Email: <input type="email" name="email"></p>
            <p>Password: <input type="password" name="password"></p>
            <input type="submit" value="Submit">
        </form>
        {% if error %}
            <p>{{ error }}</p>
            <a href="{{url_for('signup')}}">Signup</a>
        {% endif %}
    </body>
</html>
