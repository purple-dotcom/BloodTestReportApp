<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
</head>

<body>
    <form action="{{url_for('signup')}}" method="post">
        <p>Name: <input type="text" name="name"></p>
        <p>Email: <input type="email" name="email"></p>
        <p>Password: <input type="password" name="password"></p>
        <input type="submit" value="Submit">
    </form>
    {% if error %}
    <p>{{ error }}</p>
    {% endif %}
</body>

</html>
